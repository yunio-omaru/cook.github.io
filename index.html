<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ゴリのレシピ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #111;
      --card: #1b1b1b;
      --accent: #e53935;
      --accent-soft: #ff7043;
      --text: #f5f5f5;
      --muted: #aaaaaa;
      --border: #333;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #222 0, #050505 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title { cursor: pointer; }

    .icon-btn {
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      cursor: pointer;
    }

    main {
      padding: 0.75rem 1rem 1.5rem;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    .recipe-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
    }

    .recipe-card-mini {
      background: rgba(10, 10, 10, 0.9);
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
    }

    /* ▼▼ プレビュー画面 ▼▼ */
    .detail-wrapper {
      border-radius: 0.9rem;
      border: 1px solid var(--border);
      background: radial-gradient(circle at top left, #2a1515 0, #050505 55%, #000 100%);
      padding: 0.9rem;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .detail-actions {
      display: flex;
      gap: 0.4rem;
    }

    .detail-btn {
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.75rem;
    }

    .detail-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .detail-image {
      width: 100%;
      border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.12);
      object-fit: cover;
      aspect-ratio: 4 / 3;
    }

    .ingredients-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .detail-bottom {
      margin-top: 1rem;
    }

    @media (max-width: 720px) {
      .detail-top { grid-template-columns: 1fr; }
      .ingredients-columns { grid-template-columns: 1fr; }
    }
    /* ▲▲ プレビュー画面 ▲▲ */
  </style>
</head>

<body>
  <header>
    <div class="header-title" id="headerHome">ゴリのレシピ</div>
    <div class="header-actions">
      <button class="icon-btn" id="addBtn">＋</button>
      <button class="icon-btn" id="menuBtn">≡</button>
    </div>
  </header>

  <main>
    <div class="recipe-list" id="recipeList"></div>

    <!-- ▼ プレビュー画面 -->
    <section class="detail-wrapper" id="detailWrapper">
      <div class="detail-header">
        <div>
          <div id="detailTitle"></div>
          <div id="detailSubtitle" style="font-size:0.8rem;color:#ccc;"></div>
        </div>
        <div class="detail-actions">
          <button class="detail-btn" id="editRecipeBtn">編集</button>
          <button class="detail-btn" id="addNewRecipeBtn">レシピ追加</button>
        </div>
      </div>

      <div class="detail-top">
        <img id="detailImage" class="detail-image" />

        <div>
          <div style="font-size:0.8rem;color:#ccc;">材料</div>
          <div class="ingredients-columns">
            <ul id="detailIngredientsCol1"></ul>
            <ul id="detailIngredientsCol2"></ul>
          </div>
        </div>
      </div>

      <div class="detail-bottom">
        <div style="font-size:0.8rem;color:#ccc;">作り方</div>
        <ol id="detailSteps"></ol>
      </div>
    </section>
    <!-- ▲ プレビュー画面 -->
  </main>

  <script>
    let allRecipes = [];
    let currentGenre = null;
    let currentTag = null;

    document.addEventListener("DOMContentLoaded", () => {
      loadRecipeList();
      setupUI();
    });

    function setupUI() {
      document.getElementById("headerHome").onclick = () => {
        currentGenre = null;
        currentTag = null;
        renderRecipeList();
        hideDetail();
      };

      document.getElementById("addBtn").onclick = () => {
        alert("レシピ追加（モーダルは後で実装）");
      };

      document.getElementById("editRecipeBtn").onclick = () => {
        alert("編集（後で実装）");
      };

      document.getElementById("addNewRecipeBtn").onclick = () => {
        alert("レシピ追加（後で実装）");
      };
    }

    async function loadRecipeList() {
      try {
        const res = await fetch("./recipe-list.json");
        allRecipes = await res.json();
      } catch {
        allRecipes = [];
      }
      renderRecipeList();
    }

    function renderRecipeList() {
      const listEl = document.getElementById("recipeList");
      listEl.innerHTML = "";

      allRecipes.forEach(recipe => {
        const card = document.createElement("div");
        card.className = "recipe-card-mini";
        card.onclick = () => openDetail(recipe);

        card.innerHTML = `
          <img class="recipe-thumb" src="${recipe.thumb || ""}">
          <div style="padding:0.5rem;">${recipe.title}</div>
        `;
        listEl.appendChild(card);
      });
    }

    function openDetail(recipe) {
      const wrapper = document.getElementById("detailWrapper");
      wrapper.style.display = "flex";

      document.getElementById("detailTitle").textContent = recipe.title;
      document.getElementById("detailSubtitle").textContent = recipe.subtitle;
      document.getElementById("detailImage").src = recipe.thumb || "";

      const ing1 = document.getElementById("detailIngredientsCol1");
      const ing2 = document.getElementById("detailIngredientsCol2");
      ing1.innerHTML = "";
      ing2.innerHTML = "";

      const ingredients = recipe.ingredients || [];
      const half = Math.ceil(ingredients.length / 2);

      ingredients.forEach((line, i) => {
        const li = document.createElement("li");
        li.textContent = line;
        if (i < half) ing1.appendChild(li);
        else ing2.appendChild(li);
      });

      const stepsEl = document.getElementById("detailSteps");
      stepsEl.innerHTML = "";
      (recipe.steps || []).forEach(step => {
        const li = document.createElement("li");
        li.textContent = step;
        stepsEl.appendChild(li);
      });

      wrapper.scrollIntoView({ behavior: "smooth" });
    }

    function hideDetail() {
      document.getElementById("detailWrapper").style.display = "none";
    }
  </script>
</body>
</html>

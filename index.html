<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ゴリのレシピ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #111;
      --card: #1b1b1b;
      --accent: #e53935;
      --accent-soft: #ff7043;
      --text: #f5f5f5;
      --muted: #aaaaaa;
      --border: #333;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #222 0, #050505 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      font-weight: 700;
      letter-spacing: 0.08em;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .icon-btn {
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .icon-btn:hover {
      background: #222;
      border-color: var(--accent-soft);
      transform: translateY(-1px);
    }

    /* Layout */
    main {
      padding: 0.75rem 1rem 1.5rem;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    /* Category row */
    .category-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .category-btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      padding: 0.3rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .category-btn span:first-child {
      font-size: 0.75rem;
      opacity: 0.8;
    }
    .category-btn.active {
      border-color: var(--accent);
      background: linear-gradient(135deg, #2a1515, #151515);
    }
    .category-btn:hover {
      background: #222;
      border-color: var(--accent-soft);
      transform: translateY(-1px);
    }

    /* Tag bar (≡) */
    .tag-bar {
      margin-bottom: 0.75rem;
      display: none;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .tag-pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 0.2rem 0.7rem;
      font-size: 0.75rem;
      cursor: pointer;
      background: #141414;
      color: var(--muted);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .tag-pill:hover {
      border-color: var(--accent-soft);
      color: var(--text);
      background: #222;
    }

    /* Recipe list */
    .recipe-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .recipe-card-mini {
      background: rgba(10, 10, 10, 0.9);
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    }
    .recipe-card-mini:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
      border-color: var(--accent-soft);
    }
    .recipe-thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #222;
    }
    .recipe-card-mini-body {
      padding: 0.5rem 0.6rem 0.55rem;
    }
    .recipe-card-mini-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.15rem;
    }
    .recipe-card-mini-sub {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Detail area */
    .detail-wrapper {
      border-radius: 0.9rem;
      border: 1px solid var(--border);
      background: radial-gradient(circle at top left, #2a1515 0, #050505 55%, #000 100%);
      padding: 0.9rem;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      position: relative;
    }
    
    .preview-actions {
      display: none;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-bottom: -0.25rem;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
      padding-bottom: 0.4rem;
    }
    .detail-title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .detail-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .detail-tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--accent-soft);
    }
    .detail-body {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.3fr);
      gap: 0.75rem;
    }
    .detail-image {
      width: 100%;
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      object-fit: cover;
      background: #111;
      aspect-ratio: 4 / 3;
    }
    .detail-section-title {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    .detail-ingredients,
    .detail-steps {
      font-size: 0.8rem;
      line-height: 1.5;
    }
    .detail-ingredients ul,
    .detail-steps ol {
      margin: 0.2rem 0 0;
      padding-left: 1.1rem;
    }
    .detail-ingredients li,
    .detail-steps li {
      margin-bottom: 0.15rem;
    }
    .detail-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 0.2rem;
    }
    .detail-note {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* Add recipe modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .modal {
      background: #101010;
      border-radius: 0.9rem;
      border: 1px solid var(--border);
      max-width: 520px;
      width: 100%;
      padding: 0.9rem 1rem 1rem;
      max-height: 90vh;
      overflow: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .modal-title {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .close-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
    }
    .form-row {
      margin-bottom: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .form-label {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      padding: 0.35rem 0.5rem;
      font-size: 0.8rem;
    }
    .form-textarea {
      min-height: 70px;
      resize: vertical;
    }
    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--accent-soft);
    }
    .form-hint {
      font-size: 0.7rem;
      color: var(--muted);
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 0.5rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .primary-btn {
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      color: #fff;
      padding: 0.35rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.6);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.7);
    }
    .secondary-btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #151515;
      color: var(--muted);
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      cursor: pointer;
    }

    @media (max-width: 720px) {
      .detail-body {
        grid-template-columns: 1fr;
      }
      .recipe-list {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title" id="headerHome">ゴリのレシピ</div>
    <div class="header-actions">
      <button class="icon-btn" id="addBtn">＋ <span>レシピ</span></button>
      <button class="icon-btn" id="menuBtn">≡ <span>タグ</span></button>
    </div>
  </header>

  <main>
    <div class="category-row" id="categoryRow">
      <button class="category-btn" data-genre="主食">
        <span>▼</span><span>主食</span>
      </button>
      <button class="category-btn" data-genre="副食">
        <span>▼</span><span>副食</span>
      </button>
      <button class="category-btn" data-genre="副菜">
        <span>▼</span><span>副菜</span>
      </button>
      <button class="category-btn" data-genre="主菜">
        <span>▼</span><span>主菜</span>
      </button>
    </div>

    <div class="tag-bar" id="tagBar"></div>

    <div class="recipe-list" id="recipeList"></div>

    <section class="detail-wrapper" id="detailWrapper">
      <div class="preview-actions" id="previewActions">
        <button class="secondary-btn" id="previewEditBtn">編集</button>
        <button class="primary-btn" id="previewSubmitBtn">レシピ保存</button>
      </div>

      <div class="detail-header">
        <div>
          <div class="detail-title" id="detailTitle"></div>
          <div class="detail-subtitle" id="detailSubtitle"></div>
        </div>
        <div class="detail-tag" id="detailTag"></div>
      </div>
      <div class="detail-body">
        <div>
          <img id="detailImage" class="detail-image" alt="レシピ画像" />
        </div>
        <div>
          <div class="detail-section-title">材料</div>
          <div class="detail-ingredients">
            <ul id="detailIngredients"></ul>
          </div>
          <div class="detail-section-title" style="margin-top:0.5rem;">作り方</div>
          <div class="detail-steps">
            <ol id="detailSteps"></ol>
          </div>
        </div>
      </div>
      <div class="detail-footer">
        <span class="detail-note">※ このレイアウトは「ジェネリック一蘭」レシピカード形式です。</span>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="addModalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">レシピ追加</div>
        <button class="close-btn" id="addModalClose">×</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label class="form-label">ジャンル</label>
          <select class="form-select" id="inputGenre">
            <option value="主食">主食</option>
            <option value="副食">副食</option>
            <option value="副菜">副菜</option>
            <option value="主菜">主菜</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">タイトル</label>
          <input class="form-input" id="inputTitle" placeholder="例：牛すじ味噌ラーメン" />
        </div>
        <div class="form-row">
          <label class="form-label">サブタイトル（タグ）</label>
          <input class="form-input" id="inputSubtitle" placeholder="例：ラーメン, 牛肉, 味噌" />
          <div class="form-hint">カンマ区切りで複数タグを指定できます。</div>
        </div>
        <div class="form-row">
          <label class="form-label">材料（1行につき1つ）</label>
          <textarea class="form-textarea" id="inputIngredients" placeholder="豚肩ロース 300g&#10;牛すじ肉 300g&#10;味噌 大さじ4"></textarea>
        </div>
        <div class="form-row">
          <label class="form-label">作り方（1行につき1ステップ）</label>
          <textarea class="form-textarea" id="inputSteps" placeholder="ひき肉油を準備し…&#10;鍋に肉を入れ…"></textarea>
        </div>
        <div class="form-row">
          <label class="form-label">画像</label>
          <input type="file" class="form-input" id="inputImage" accept="image/*" />
          <div class="form-hint">画像はレシピカード内に base64 で埋め込みます。</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="secondary-btn" id="previewBtn">プレビュー</button>
        <button class="primary-btn" id="downloadBtn">レシピHTMLを保存</button>
      </div>
    </div>
  </div>

  <script>
    let allRecipes = []; 
    let currentGenre = null;
    let currentTag = null;
    let currentPreviewData = null;

    document.addEventListener("DOMContentLoaded", () => {
      setupHeader();
      setupCategories();
      setupAddModal();
      setupPreviewActions();
      loadRecipeList();
    });

    function returnToMainMenu() {
      currentGenre = null;
      currentTag = null;
      clearActiveCategories();
      document.getElementById("tagBar").style.display = "none";
      renderRecipeList();
      hideDetail();
    }

    function setupHeader() {
      document.getElementById("headerHome").addEventListener("click", returnToMainMenu);
      document.getElementById("addBtn").addEventListener("click", openAddModal);
      document.getElementById("menuBtn").addEventListener("click", toggleTagBar);
    }

    function setupCategories() {
      const row = document.getElementById("categoryRow");
      row.addEventListener("click", (e) => {
        const btn = e.target.closest(".category-btn");
        if (!btn) return;
        const genre = btn.dataset.genre;
        if (!genre) return;
        
        if (btn.classList.contains("active")) {
          returnToMainMenu();
          return;
        }

        currentGenre = genre;
        currentTag = null;
        clearActiveCategories();
        btn.classList.add("active");
        renderRecipeList();
        hideDetail();
      });
    }

    function clearActiveCategories() {
      document.querySelectorAll(".category-btn").forEach((b) => b.classList.remove("active"));
    }

    function toggleTagBar() {
      const bar = document.getElementById("tagBar");
      if (bar.style.display === "flex") {
        bar.style.display = "none";
        currentTag = null;
        renderRecipeList();
        hideDetail();
        return;
      }
      const tags = new Set();
      allRecipes.forEach((r) => {
        (r.tags || []).forEach((t) => tags.add(t));
      });
      bar.innerHTML = "";
      Array.from(tags).sort().forEach((tag) => {
        const pill = document.createElement("button");
        pill.className = "tag-pill";
        pill.textContent = tag;
        pill.addEventListener("click", () => {
          currentTag = tag;
          currentGenre = null;
          clearActiveCategories();
          renderRecipeList();
          hideDetail();
        });
        bar.appendChild(pill);
      });
      bar.style.display = tags.size ? "flex" : "none";
    }

    async function loadRecipeList() {
      try {
        const res = await fetch("recipe-list.json", { cache: "no-store" });
        if (!res.ok) throw new Error("failed");
        const data = await res.json();
        allRecipes = Array.isArray(data) ? data : [];
      } catch (e) {
        allRecipes = [];
      }
      renderRecipeList();
    }

    function renderRecipeList() {
      const listEl = document.getElementById("recipeList");
      listEl.innerHTML = "";

      let filtered = allRecipes.slice();
      if (currentGenre) {
        filtered = filtered.filter((r) => r.genre === currentGenre);
      }
      if (currentTag) {
        filtered = filtered.filter((r) => (r.tags || []).includes(currentTag));
      }

      if (filtered.length === 0) {
        listEl.innerHTML = '<div style="color:var(--muted); font-size:0.8rem; padding:1rem;">レシピがまだありません。</div>';
        return;
      }

      filtered.forEach((recipe) => {
        const card = document.createElement("article");
        card.className = "recipe-card-mini";
        card.addEventListener("click", () => {
          window.location.href = "recipes/" + recipe.file;
        });

        const img = document.createElement("img");
        img.className = "recipe-thumb";
        img.src = recipe.thumb || "";
        img.alt = recipe.title || "レシピ画像";

        const body = document.createElement("div");
        body.className = "recipe-card-mini-body";

        const title = document.createElement("div");
        title.className = "recipe-card-mini-title";
        title.textContent = recipe.title || "";

        const sub = document.createElement("div");
        sub.className = "recipe-card-mini-sub";
        sub.textContent = (recipe.tags || []).join(", ");

        body.appendChild(title);
        body.appendChild(sub);
        card.appendChild(img);
        card.appendChild(body);
        listEl.appendChild(card);
      });
    }

    async function openDetail(recipe, isPreview = false) {
      const wrapper = document.getElementById("detailWrapper");
      const titleEl = document.getElementById("detailTitle");
      const subEl = document.getElementById("detailSubtitle");
      const tagEl = document.getElementById("detailTag");
      const imgEl = document.getElementById("detailImage");
      const ingEl = document.getElementById("detailIngredients");
      const stepsEl = document.getElementById("detailSteps");
      const actionsEl = document.getElementById("previewActions");

      if (isPreview) {
        actionsEl.style.display = "flex";
        currentPreviewData = recipe;
      } else {
        actionsEl.style.display = "none";
        currentPreviewData = null;
      }

      titleEl.textContent = recipe.title || "";
      subEl.textContent = recipe.subtitle || "";
      tagEl.textContent = (recipe.tags || []).join(", ") || recipe.genre || "";

      imgEl.src = recipe.image || recipe.thumb || "";
      imgEl.style.display = imgEl.src ? "block" : "none";

      ingEl.innerHTML = "";
      (recipe.ingredients || []).forEach((line) => {
        const li = document.createElement("li");
        li.textContent = line;
        ingEl.appendChild(li);
      });

      stepsEl.innerHTML = "";
      (recipe.steps || []).forEach((line) => {
        const li = document.createElement("li");
        li.textContent = line;
        stepsEl.appendChild(li);
      });

      wrapper.style.display = "flex";
      wrapper.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function hideDetail() {
      document.getElementById("detailWrapper").style.display = "none";
      document.getElementById("previewActions").style.display = "none";
      currentPreviewData = null;
    }

    function setupPreviewActions() {
      document.getElementById("previewEditBtn").addEventListener("click", () => {
        hideDetail();
        openAddModal();
      });

      document.getElementById("previewSubmitBtn").addEventListener("click", () => {
        if (!currentPreviewData) return;
        downloadRecipeHtml(currentPreviewData);
        closeAddModal(true); 
        returnToMainMenu();
      });
    }

    function setupAddModal() {
      const backdrop = document.getElementById("addModalBackdrop");
      const closeBtn = document.getElementById("addModalClose");
      
      const handleClose = () => {
        if (isFormDirty()) {
          if (confirm("入力中の内容があります。保存せず終了してOK？")) {
            closeAddModal();
            returnToMainMenu();
          }
        } else {
          closeAddModal();
          returnToMainMenu();
        }
      };

      closeBtn.addEventListener("click", handleClose);
      backdrop.addEventListener("click", (e) => { if (e.target === backdrop) handleClose(); });

      document.getElementById("previewBtn").addEventListener("click", async () => {
        const recipe = await collectRecipeFromForm();
        if (!recipe) return;
        openDetail(recipe, true);
        closeAddModal(false); 
      });

      document.getElementById("downloadBtn").addEventListener("click", async () => {
        const recipe = await collectRecipeFromForm();
        if (!recipe) return;
        downloadRecipeHtml(recipe);
      });
    }

    function isFormDirty() {
      const title = document.getElementById("inputTitle").value.trim();
      const subtitle = document.getElementById("inputSubtitle").value.trim();
      const ingredients = document.getElementById("inputIngredients").value.trim();
      const steps = document.getElementById("inputSteps").value.trim();
      const fileInput = document.getElementById("inputImage");
      return !!(title || subtitle || ingredients || steps || (fileInput.files && fileInput.files.length > 0));
    }

    function openAddModal() {
      document.getElementById("addModalBackdrop").style.display = "flex";
    }

    function closeAddModal(clear = true) {
      document.getElementById("addModalBackdrop").style.display = "none";
      if (clear) {
        document.getElementById("inputTitle").value = "";
        document.getElementById("inputSubtitle").value = "";
        document.getElementById("inputIngredients").value = "";
        document.getElementById("inputSteps").value = "";
        document.getElementById("inputImage").value = "";
      }
    }

    async function collectRecipeFromForm() {
      const genre = document.getElementById("inputGenre").value.trim();
      const title = document.getElementById("inputTitle").value.trim();
      const subtitle = document.getElementById("inputSubtitle").value.trim();
      const ingredientsText = document.getElementById("inputIngredients").value;
      const stepsText = document.getElementById("inputSteps").value;
      const fileInput = document.getElementById("inputImage");

      if (!title) {
        alert("タイトルは必須です。");
        return null;
      }

      const ingredients = ingredientsText.split("\n").map((l) => l.trim()).filter((l) => l);
      const steps = stepsText.split("\n").map((l) => l.trim()).filter((l) => l);
      const tags = subtitle.split(",").map((t) => t.trim()).filter((t) => t);

      let imageData = "";
      if (fileInput.files && fileInput.files[0]) {
        imageData = await readFileAsDataURL(fileInput.files[0]);
      } else if (currentPreviewData && currentPreviewData.image) {
        imageData = currentPreviewData.image;
      }

      return {
        genre,
        title,
        subtitle,
        tags,
        ingredients,
        steps,
        image: imageData,
        thumb: imageData,
        file: safeFileName(title) + ".html",
      };
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader(); // ← ここを const reader に修正しました
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = (e) => reject(e);
        reader.readAsDataURL(file);
      });
    }

    function safeFileName(title) {
      return title.replace(/[\\\/:*?"<>|]/g, "_").trim() || "recipe";
    }

    function downloadRecipeHtml(recipe) {
      const html = buildRecipeCardHtml(recipe);
      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = recipe.file;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      alert("レシピHTMLを保存しました。\nGitHubの recipes フォルダにアップロードしてください。");
    }

    function buildRecipeCardHtml(recipe) {
      const ingList = (recipe.ingredients || []).map((l) => `<li>${escapeHtml(l)}</li>`).join("");
      const stepList = (recipe.steps || []).map((l) => `<li>${escapeHtml(l)}</li>`).join("");
      const tagsText = (recipe.tags || []).join(", ");

      return `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>${escapeHtml(recipe.title)}</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #222 0, #050505 55%, #000 100%);
  color: #f5f5f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 1rem;
}
.card {
  max-width: 900px;
  width: 100%;
  border-radius: 0.9rem;
  border: 1px solid #333;
  background: radial-gradient(circle at top left, #2a1515 0, #050505 55%, #000 100%);
  padding: 0.9rem;
  box-sizing: border-box;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 0.5rem;
  border-bottom: 1px dashed rgba(255,255,255,0.08);
  padding-bottom: 0.4rem;
}
.card-title { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.06em; }
.card-subtitle { font-size: 0.75rem; color: #aaaaaa; }
.card-tag { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15); color: #ff7043; }
.card-body { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.3fr); gap: 0.75rem; margin-top: 0.75rem; }
.card-image { width: 100%; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.12); object-fit: cover; background: #111; aspect-ratio: 4 / 3; }
.section-title { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: #aaaaaa; margin-bottom: 0.25rem; }
.ingredients, .steps { font-size: 0.8rem; line-height: 1.5; }
.ingredients ul, .steps ol { margin: 0.2rem 0 0; padding-left: 1.1rem; }
.ingredients li, .steps li { margin-bottom: 0.15rem; }
.card-footer { margin-top: 0.4rem; font-size: 0.7rem; color: #aaaaaa; text-align: right; }
@media (max-width: 720px) { .card-body { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <article class="card" data-genre="${escapeHtml(recipe.genre)}" data-title="${escapeHtml(recipe.title)}" data-subtitle="${escapeHtml(recipe.subtitle || "")}" data-tags="${escapeHtml(tagsText)}">
    <header class="card-header">
      <div>
        <div class="card-title">${escapeHtml(recipe.title)}</div>
        <div class="card-subtitle">${escapeHtml(recipe.subtitle || "")}</div>
      </div>
      <div class="card-tag">${escapeHtml(tagsText || recipe.genre || "")}</div>
    </header>
    <section class="card-body">
      <div>
        ${
          recipe.image
            ? `<img src="${recipe.image}" id="cardImage" alt="レシピ画像" class="card-image" />`
            : `<div class="card-image" id="cardImage"></div>`
        }
      </div>
      <div>
        <div class="section-title">材料</div>
        <div class="ingredients"><ul>${ingList}</ul></div>
        <div class="section-title" style="margin-top:0.5rem;">作り方</div>
        <div class="steps"><ol>${stepList}</ol></div>
      </div>
    </section>
    <footer class="card-footer">ゴリのレシピ</footer>
  </article>
</body>
</html>`;
    }

    function escapeHtml(str) {
      return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ゴリのレシピ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #111;
      --card: #1b1b1b;
      --accent: #e53935;
      --accent-soft: #ff7043;
      --text: #f5f5f5;
      --muted: #aaaaaa;
      --border: #333;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #222 0, #050505 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      font-weight: 700;
      letter-spacing: 0.08em;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .icon-btn {
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .icon-btn:hover {
      background: #222;
      border-color: var(--accent-soft);
      transform: translateY(-1px);
    }

    main {
      padding: 0.75rem 1rem 1.5rem;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    .category-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .category-btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      padding: 0.3rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .category-btn.active {
      border-color: var(--accent);
      background: linear-gradient(135deg, #2a1515, #151515);
    }

    .tag-bar {
      margin-bottom: 0.75rem;
      display: none;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .tag-pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 0.2rem 0.7rem;
      font-size: 0.75rem;
      cursor: pointer;
      background: #141414;
      color: var(--muted);
    }

    .recipe-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .recipe-card-mini {
      background: rgba(10, 10, 10, 0.9);
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .recipe-thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #222;
    }

    /* ▼▼ ここからプレビュー用レイアウト ▼▼ */
    .detail-wrapper {
      border-radius: 0.9rem;
      border: 1px solid var(--border);
      background: radial-gradient(circle at top left, #2a1515 0, #050505 55%, #000 100%);
      padding: 0.9rem;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
    }
    .detail-actions {
      display: flex;
      gap: 0.4rem;
    }
    .detail-btn {
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .detail-btn:hover {
      background: #222;
      border-color: var(--accent-soft);
    }
    .detail-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .detail-image {
      width: 100%;
      border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.12);
      object-fit: cover;
      background: #111;
      aspect-ratio: 4 / 3;
    }
    .ingredients-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }
    .detail-section-title {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    .detail-bottom {
      margin-top: 1rem;
    }
    .detail-bottom ol {
      padding-left: 1.2rem;
    }
    @media (max-width: 720px) {
      .detail-top {
        grid-template-columns: 1fr;
      }
      .ingredients-columns {
        grid-template-columns: 1fr;
      }
    }
    /* ▲▲ ここまでプレビュー用レイアウト ▲▲ */
  </style>
</head>

<body>
  <header>
    <div class="header-title" id="headerHome">ゴリのレシピ</div>
    <div class="header-actions">
      <button class="icon-btn" id="addBtn">＋</button>
      <button class="icon-btn" id="menuBtn">≡</button>
    </div>
  </header>

  <main>
    <div class="category-row" id="categoryRow">
      <button class="category-btn" data-genre="主食">▼ 主食</button>
      <button class="category-btn" data-genre="副食">▼ 副食</button>
      <button class="category-btn" data-genre="副菜">▼ 副菜</button>
      <button class="category-btn" data-genre="主菜">▼ 主菜</button>
    </div>

    <div class="tag-bar" id="tagBar"></div>

    <div class="recipe-list" id="recipeList"></div>

    <!-- ▼ プレビューエリア（中身を構造化） -->
    <section class="detail-wrapper" id="detailWrapper">
      <div class="detail-header">
        <div>
          <div id="detailTitle"></div>
          <div id="detailSubtitle" style="font-size:0.8rem;color:#ccc;"></div>
        </div>
        <div class="detail-actions">
          <button class="detail-btn" id="editRecipeBtn">編集</button>
          <button class="detail-btn" id="addNewRecipeBtn">レシピ追加</button>
        </div>
      </div>

      <div class="detail-top">
        <img id="detailImage" class="detail-image" alt="レシピ画像" />
        <div>
          <div class="detail-section-title">材料</div>
          <div class="ingredients-columns">
            <ul id="detailIngredientsCol1"></ul>
            <ul id="detailIngredientsCol2"></ul>
          </div>
        </div>
      </div>

      <div class="detail-bottom">
        <div class="detail-section-title">作り方</div>
        <ol id="detailSteps"></ol>
      </div>
    </section>
    <!-- ▲ プレビューエリア -->
  </main>

  <script>
    let allRecipes = [];
    let currentGenre = null;
    let currentTag = null;

    document.addEventListener("DOMContentLoaded", () => {
      loadRecipeList();
      setupUI();
    });

    function setupUI() {
      document.getElementById("headerHome").onclick = () => {
        currentGenre = null;
        currentTag = null;
        renderRecipeList();
        hideDetail();
      };

      document.getElementById("addBtn").onclick = () => {
        alert("レシピ追加ボタン（＋）が押されました（ここにモーダル起動処理を後で入れる）");
      };

      document.getElementById("menuBtn").onclick = () => {
        toggleTagBar();
      };

      document.getElementById("categoryRow").onclick = (e) => {
        const btn = e.target.closest(".category-btn");
        if (!btn) return;
        currentGenre = btn.dataset.genre;
        currentTag = null;
        renderRecipeList();
        hideDetail();
      };

      // プレビュー右上ボタンの仮動作
      document.getElementById("editRecipeBtn").onclick = () => {
        alert("編集ボタンが押されました（ここに編集モード復帰処理を後で入れる）");
      };
      document.getElementById("addNewRecipeBtn").onclick = () => {
        alert("レシピ追加ボタンが押されました（ここに新規追加処理を後で入れる）");
      };
    }

    async function loadRecipeList() {
      try {
        const res = await fetch("./recipe-list.json", { cache: "no-store" });
        allRecipes = await res.json();
      } catch {
        allRecipes = [];
      }
      renderRecipeList();
    }

    function renderRecipeList() {
      const listEl = document.getElementById("recipeList");
      listEl.innerHTML = "";

      let filtered = allRecipes;
      if (currentGenre) filtered = filtered.filter(r => r.genre === currentGenre);
      if (currentTag) filtered = filtered.filter(r => (r.tags || []).includes(currentTag));

      if (filtered.length === 0) {
        listEl.innerHTML = `<div style="color:#aaa;font-size:0.9rem;">レシピ登録なし</div>`;
        return;
      }

      filtered.forEach(recipe => {
        const card = document.createElement("div");
        card.className = "recipe-card-mini";
        card.onclick = () => openDetail(recipe);

        card.innerHTML = `
          <img class="recipe-thumb" src="${recipe.thumb || ""}">
          <div style="padding:0.5rem;">${recipe.title}</div>
        `;
        listEl.appendChild(card);
      });
    }

    async function openDetail(recipe) {
      const wrapper = document.getElementById("detailWrapper");
      wrapper.style.display = "flex";

      // タイトル・サブタイトル
      document.getElementById("detailTitle").textContent = recipe.title || "";
      document.getElementById("detailSubtitle").textContent = recipe.subtitle || "";

      // 画像
      const img = document.getElementById("detailImage");
      img.src = recipe.thumb || "";
      img.alt = recipe.title || "レシピ画像";

      // 材料（2列に分割）
      const ing1 = document.getElementById("detailIngredientsCol1");
      const ing2 = document.getElementById("detailIngredientsCol2");
      ing1.innerHTML = "";
      ing2.innerHTML = "";

      let ingredients = [];
      try {
        // もしレシピHTML側に材料が埋め込まれていない場合を考えて、recipe.ingredients があればそれを使う想定
        ingredients = recipe.ingredients || [];
      } catch {
        ingredients = [];
      }
      const half = Math.ceil(ingredients.length / 2);
      ingredients.forEach((line, i) => {
        const li = document.createElement("li");
        li.textContent = line;
        if (i < half) ing1.appendChild(li);
        else ing2.appendChild(li);
      });

      // 作り方
      const stepsEl = document.getElementById("detailSteps");
      stepsEl.innerHTML = "";
      const steps = recipe.steps || [];
      steps.forEach(line => {
        const li = document.createElement("li");
        li.textContent = line;
        stepsEl.appendChild(li);
      });

      wrapper.scrollIntoView({ behavior: "smooth" });
    }

    function hideDetail() {
      document.getElementById("detailWrapper").style.display = "none";
    }

    function toggleTagBar() {
      const bar = document.getElementById("tagBar");
      if (bar.style.display === "flex") {
        bar.style.display = "none";
        currentTag = null;
        renderRecipeList();
        return;
      }

      const tags = new Set();
      allRecipes.forEach(r => (r.tags || []).forEach(t => tags.add(t)));

      bar.innerHTML = "";
      tags.forEach(tag => {
        const pill = document.createElement("button");
        pill.className = "tag-pill";
        pill.textContent = tag;
        pill.onclick = () => {
          currentTag = tag;
          currentGenre = null;
          renderRecipeList();
          hideDetail();
        };
        bar.appendChild(pill);
      });

      bar.style.display = "flex";
    }
  </script>
</body>
</html>

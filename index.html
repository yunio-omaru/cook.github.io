<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゴリのレシピ</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #f5f5f7; }
    header {
      background: #ffffff; padding: 14px 20px; display: flex;
      align-items: center; justify-content: space-between;
      border-bottom: 1px solid #ddd; position: sticky; top: 0;
    }
    .header-left { font-size: 20px; font-weight: 700; }
    .header-center a { margin: 0 10px; text-decoration: none; color: #333; font-size: 14px; }
    .add-button {
      background: #ff4d4d; color: #fff; border: none;
      padding: 8px 14px; border-radius: 8px; font-size: 18px; cursor: pointer;
    }
    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    .recipe-card {
      background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08); text-decoration: none; color: #000; display: block;
    }
    .recipe-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .recipe-sub { font-size: 13px; color: #777; }
  </style>
</head>

<body>

<header>
  <div class="header-left">ゴリのレシピ</div>

  <div class="header-center">
    <a href="genre/shushoku.html">主食</a>
    <a href="genre/fukushoku.html">副食</a>
    <a href="genre/shusai.html">主菜</a>
    <a href="genre/fukusai.html">副菜</a>
  </div>

  <button class="add-button" onclick="location.href='add.html'">＋</button>
</header>

<div class="container" id="list"></div>

<script>
function loadRecipes() {
  const list = JSON.parse(localStorage.getItem("recipes") || "[]");
  const container = document.getElementById("list");

  list.forEach(r => {
    const card = document.createElement("a");
    card.className = "recipe-card";
    card.href = "recipes/" + r.file;

    card.innerHTML = `
      <div class="recipe-title">${r.title}</div>
      <div class="recipe-sub">${r.subtitle}</div>
    `;

    container.appendChild(card);
  });
}

loadRecipes();
</script>

</body>
</html>

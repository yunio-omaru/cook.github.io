<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ゴリのレシピ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #111;
      --card: #1b1b1b;
      --accent: #e53935;
      --accent-soft: #ff7043;
      --text: #f5f5f5;
      --muted: #aaaaaa;
      --border: #333;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #222 0, #050505 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      font-weight: 700;
      letter-spacing: 0.08em;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .icon-btn {
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .icon-btn:hover {
      background: #222;
      border-color: var(--accent-soft);
      transform: translateY(-1px);
    }

    /* Layout */
    main {
      padding: 0.75rem 1rem 1.5rem;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    /* Category row */
    .category-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .category-btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      padding: 0.3rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .category-btn span:first-child {
      font-size: 0.75rem;
      opacity: 0.8;
    }
    .category-btn.active {
      border-color: var(--accent);
      background: linear-gradient(135deg, #2a1515, #151515);
    }
    .category-btn:hover {
      background: #222;
      border-color: var(--accent-soft);
      transform: translateY(-1px);
    }

    /* Tag bar (≡) */
    .tag-bar {
      margin-bottom: 0.75rem;
      display: none;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .tag-pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 0.2rem 0.7rem;
      font-size: 0.75rem;
      cursor: pointer;
      background: #141414;
      color: var(--muted);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .tag-pill:hover {
      border-color: var(--accent-soft);
      color: var(--text);
      background: #222;
    }

    /* Recipe list */
    .recipe-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .recipe-card-mini {
      background: rgba(10, 10, 10, 0.9);
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
    }
    .recipe-card-mini:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
      border-color: var(--accent-soft);
    }
    
    .recipe-thumb-wrapper {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #222;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .recipe-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .recipe-thumb-placeholder {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--muted);
      opacity: 0.4;
    }

    .recipe-card-mini-body {
      padding: 0.5rem 0.6rem 0.55rem;
    }
    .recipe-card-mini-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.15rem;
    }
    .recipe-card-mini-sub {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Detail area */
    .detail-wrapper {
      border-radius: 0.9rem;
      border: 1px solid var(--border);
      background: radial-gradient(circle at top left, #2a1515 0, #050505 55%, #000 100%);
      padding: 0.9rem;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      position: relative;
    }
    
    .preview-actions {
      display: none;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-bottom: -0.25rem;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
      padding-bottom: 0.4rem;
    }
    .detail-title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .detail-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .detail-tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--accent-soft);
    }
    
    .detail-body {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .detail-top-row {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.3fr);
      gap: 0.75rem;
    }

    .detail-image {
      width: 100%;
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      object-fit: cover;
      background: #111;
      aspect-ratio: 4 / 3;
    }
    .detail-section-title {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }
    .detail-ingredients,
    .detail-steps {
      font-size: 0.8rem;
      line-height: 1.5;
    }
    .detail-ingredients ul,
    .detail-steps ol {
      margin: 0.2rem 0 0;
      padding-left: 1.1rem;
    }
    .detail-ingredients li,
    .detail-steps li {
      margin-bottom: 0.15rem;
    }
    .detail-footer {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 0.2rem;
    }
    .detail-note {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* Add recipe modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .modal {
      background: #101010;
      border-radius: 0.9rem;
      border: 1px solid var(--border);
      max-width: 520px;
      width: 100%;
      padding: 0.9rem 1rem 1rem;
      max-height: 90vh;
      overflow: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .modal-title {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .close-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
    }
    .form-row {
      margin-bottom: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .form-label {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .form-input,
    .form-textarea,
    .form-select {
      width: 100%;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      padding: 0.35rem 0.5rem;
      font-size: 0.8rem;
    }
    .form-textarea {
      min-height: 70px;
      resize: vertical;
    }
    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--accent-soft);
    }
    .form-hint {
      font-size: 0.7rem;
      color: var(--muted);
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 0.5rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .primary-btn {
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      color: #fff;
      padding: 0.35rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.6);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .primary-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.7);
    }
    .secondary-btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #151515;
      color: var(--muted);
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
      cursor: pointer;
    }

    /* GitHub Settings Accordion */
    .gh-settings-toggle {
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      text-align: left;
      padding: 0.3rem 0;
      user-select: none;
    }
    .gh-settings-content {
      display: none;
      border: 1px dashed var(--border);
      padding: 0.6rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      background: #0d0d0d;
    }

    @media (max-width: 720px) {
      .detail-top-row {
        grid-template-columns: 1fr;
      }
      .recipe-list {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title" id="headerHome">ゴリのレシピ</div>
    <div class="header-actions">
      <button class="icon-btn" id="addBtn">＋ <span>レシピ</span></button>
      <button class="icon-btn" id="menuBtn">≡ <span>タグ</span></button>
    </div>
  </header>

  <main>
    <div class="category-row" id="categoryRow">
      <button class="category-btn" data-genre="主食">
        <span>▼</span><span>主食</span>
      </button>
      <button class="category-btn" data-genre="副食">
        <span>▼</span><span>副食</span>
      </button>
      <button class="category-btn" data-genre="副菜">
        <span>▼</span><span>副菜</span>
      </button>
      <button class="category-btn" data-genre="主菜">
        <span>▼</span><span>主菜</span>
      </button>
    </div>

    <div class="tag-bar" id="tagBar"></div>

    <div class="recipe-list" id="recipeList"></div>

    <section class="detail-wrapper" id="detailWrapper">
      <div class="preview-actions" id="previewActions">
        <button class="secondary-btn" id="previewEditBtn">編集</button>
        <button class="primary-btn" id="previewSubmitBtn">GitHubへ自動保存</button>
      </div>

      <div class="detail-header">
        <div>
          <div class="detail-title" id="detailTitle"></div>
          <div class="detail-subtitle" id="detailSubtitle"></div>
        </div>
        <div class="detail-tag" id="detailTag"></div>
      </div>
      
      <div class="detail-body">
        <div class="detail-top-row">
          <div>
            <img id="detailImage" class="detail-image" alt="レシピ画像" />
          </div>
          <div>
            <div class="detail-section-title">材料</div>
            <div class="detail-ingredients">
              <ul id="detailIngredients"></ul>
            </div>
          </div>
        </div>
        <div>
          <div class="detail-section-title" style="margin-top:0.5rem;">作り方</div>
          <div class="detail-steps">
            <ol id="detailSteps"></ol>
          </div>
        </div>
      </div>
      
      <div class="detail-footer">
        <span class="detail-note">ゴリのレシピ</span>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="addModalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">レシピ追加</div>
        <button class="close-btn" id="addModalClose">×</button>
      </div>
      <div class="modal-body">
        <div class="gh-settings-toggle" id="ghToggle">▶ GitHub自動保存の設定（初回のみ要入力）</div>
        <div class="gh-settings-content" id="ghContent">
          <div class="form-row">
            <label class="form-label">GitHubユーザー名</label>
            <input class="form-input" id="ghUser" placeholder="例：yunio-omaru" />
          </div>
          <div class="form-row">
            <label class="form-label">個人アクセストークン（PAT）</label>
            <input type="password" class="form-input" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" />
          </div>
        </div>

        <div class="form-row">
          <label class="form-label">ジャンル</label>
          <select class="form-select" id="inputGenre">
            <option value="主食">主食</option>
            <option value="副食">副食</option>
            <option value="副菜">副菜</option>
            <option value="主菜">主菜</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">タイトル</label>
          <input class="form-input" id="inputTitle" placeholder="例：牛すじ味噌ラーメン" />
        </div>
        <div class="form-row">
          <label class="form-label">サブタイトル（タグ）</label>
          <input class="form-input" id="inputSubtitle" placeholder="例：ラーメン, 牛肉, 味噌" />
          <div class="form-hint">カンマ区切りで複数タグを指定できます。</div>
        </div>
        <div class="form-row">
          <label class="form-label">材料（1行につき1つ）</label>
          <textarea class="form-textarea" id="inputIngredients" placeholder="豚肩ロース 300g&#10;牛すじ肉 300g&#10;味噌 大さじ4"></textarea>
        </div>
        <div class="form-row">
          <label class="form-label">作り方（1行につき1ステップ）</label>
          <textarea class="form-textarea" id="inputSteps" placeholder="ひき肉油を準備し…&#10;鍋に肉を入れ…"></textarea>
        </div>
        <div class="form-row">
          <label class="form-label">画像</label>
          <input type="file" class="form-input" id="inputImage" accept="image/*" />
          <div class="form-hint">画像はレシピカード内に base64 で埋め込みます。</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="secondary-btn" id="previewBtn">プレビュー</button>
        <button class="primary-btn" id="downloadBtn">GitHubへ自動保存</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>

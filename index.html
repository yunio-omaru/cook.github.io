<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>レシピ一覧</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 20px;
  }
  h1 {
    font-size: 26px;
    margin-bottom: 20px;
  }
  .menu a {
    display: inline-block;
    margin-right: 15px;
    padding: 10px 15px;
    background: #ff4d4d;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
  }
  .recipe {
    background: #fff;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    display: flex;
    gap: 15px;
    align-items: center;
  }
  .recipe img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 10px;
  }
</style>
</head>

<body>

<h1>レシピ一覧</h1>

<div class="menu">
  <a href="genre.html">主食</a>
  <a href="genre.html">副食</a>
  <a href="genre.html">主菜</a>
  <a href="genre.html">副菜</a>
  <a href="add.html">＋ レシピ追加</a>
</div>

<div id="list"></div>

<script>
const JSON_URL = "https://raw.githubusercontent.com/yunio-omaru/cook.github.io/main/recipe-list.json";

fetch(JSON_URL)
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("list");

    data.forEach(r => {
      const div = document.createElement("div");
      div.className = "recipe";

      div.innerHTML = `
        ${r.image ? `<img src="${r.image}">` : `<img src="https://via.placeholder.com/120?text=No+Image">`}
        <div>
          <h3>${r.title}</h3>
          <p>${r.subtitle}</p>
          <p>ジャンル：${r.genre}</p>
          <a href="${r.file}">レシピを見る</a>
        </div>
      `;

      list.appendChild(div);
    });
  });
</script>

</body>
</html>

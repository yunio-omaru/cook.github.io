<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ゴリのレシピ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #111;
      --card: #1b1b1b;
      --accent: #e53935;
      --accent-soft: #ff7043;
      --text: #f5f5f5;
      --muted: #aaaaaa;
      --border: #333;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #222 0, #050505 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      font-weight: 700;
      letter-spacing: 0.08em;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .icon-btn {
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      border-radius: 999px;
      padding: 0.25rem 0.7rem;
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .icon-btn:hover {
      background: #222;
      border-color: var(--accent-soft);
      transform: translateY(-1px);
    }

    main {
      padding: 0.75rem 1rem 1.5rem;
      max-width: 960px;
      width: 100%;
      margin: 0 auto;
    }

    .category-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .category-btn {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      padding: 0.3rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    .category-btn.active {
      border-color: var(--accent);
      background: linear-gradient(135deg, #2a1515, #151515);
    }

    .tag-bar {
      margin-bottom: 0.75rem;
      display: none;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .tag-pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 0.2rem 0.7rem;
      font-size: 0.75rem;
      cursor: pointer;
      background: #141414;
      color: var(--muted);
    }

    .recipe-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .recipe-card-mini {
      background: rgba(10, 10, 10, 0.9);
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .recipe-thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #222;
    }

    /* detail */
    .detail-wrapper {
      border-radius: 0.9rem;
      border: 1px solid var(--border);
      background: radial-gradient(circle at top left, #2a1515 0, #050505 55%, #000 100%);
      padding: 0.9rem;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .detail-actions {
      display: flex;
      gap: 0.4rem;
    }

    .detail-btn {
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .detail-btn:hover {
      background: #222;
      border-color: var(--accent-soft);
    }

    .detail-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .detail-image {
      width: 100%;
      border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.12);
      object-fit: cover;
      background: #111;
      aspect-ratio: 4 / 3;
    }

    .ingredients-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .detail-bottom {
      margin-top: 1rem;
    }

    .detail-section-title {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
    }

    @media (max-width: 720px) {
      .detail-top {
        grid-template-columns: 1fr;
      }
      .ingredients-columns {
        grid-template-columns: 1fr;
      }
    }

    /* add modal */
    #addModalBackdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    #addModal {
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      width: min(90%, 600px);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-row {
      margin-bottom: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .modal-row label {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .modal-row input,
    .modal-row textarea {
      width: 100%;
      padding: 0.4rem;
      border-radius: 0.4rem;
      border: 1px solid var(--border);
      background: #111;
      color: var(--text);
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    .modal-btn {
      padding: 0.4rem 0.8rem;
      border-radius: 0.4rem;
      border: 1px solid var(--border);
      background: #151515;
      color: var(--text);
      cursor: pointer;
    }
    .modal-btn:hover {
      background: #222;
    }
  </style>
</head>

<body>
  <!-- レシピ追加モーダル -->
  <div id="addModalBackdrop">
    <div id="addModal">
      <h2 style="margin-top:0;">レシピ追加</h2>

      <div class="modal-row">
        <label>ジャンル</label>
        <input id="inputGenre" placeholder="主食 / 副食 / 副菜 / 主菜" />
      </div>

      <div class="modal-row">
        <label>タイトル</label>
        <input id="inputTitle" placeholder="例：牛丼" />
      </div>

      <div class="modal-row">
        <label>サブタイトル</label>
        <input id="inputSubtitle" placeholder="例：甘辛タレでご飯が進む" />
      </div>

      <div class="modal-row">
        <label>材料（1行につき1つ）</label>
        <textarea id="inputIngredients" rows="5" placeholder="牛肉 200g&#10;玉ねぎ 1個&#10;醤油 大さじ2"></textarea>
      </div>

      <div class="modal-row">
        <label>作り方（1行につき1工程）</label>
        <textarea id="inputSteps" rows="6" placeholder="玉ねぎを切る&#10;牛肉を炒める&#10;調味料を入れて煮る"></textarea>
      </div>

      <div class="modal-row">
        <label>画像URL（任意）</label>
        <input id="inputImage" placeholder="https://example.com/photo.jpg" />
      </div>

      <div class="modal-actions">
        <button class="modal-btn" id="cancelAddBtn">キャンセル</button>
        <button class="modal-btn" id="saveAddBtn">保存（HTMLダウンロード）</button>
      </div>
    </div>
  </div>

  <script>
    let allRecipes = [];
    let currentGenre = null;
    let currentTag = null;
    let isEditing = false;
    window._currentRecipe = null;

    document.addEventListener("DOMContentLoaded", () => {
      loadRecipeList();
      setupUI();
      setupEditingGuard();
      setupAddModal();
    });

    function setupUI() {
      document.getElementById("headerHome").onclick = () => {
        if (!confirmEditing()) return;
        currentGenre = null;
        currentTag = null;
        renderRecipeList();
        hideDetail();
      };

      document.getElementById("addBtn").onclick = () => {
        if (!confirmEditing()) return;
        openAddModal();
      };

      document.getElementById("menuBtn").onclick = () => {
        if (!confirmEditing()) return;
        toggleTagBar();
      };

      document.getElementById("categoryRow").onclick = (e) => {
        if (!confirmEditing()) return;
        const btn = e.target.closest(".category-btn");
        if (!btn) return;
        currentGenre = btn.dataset.genre;
        currentTag = null;
        renderRecipeList();
        hideDetail();
      };
    }

    function setupEditingGuard() {
      ["inputGenre", "inputTitle", "inputSubtitle", "inputIngredients", "inputSteps", "inputImage"]
        .forEach(id => {
          const el = document.getElementById(id);
          if (el) {
            el.addEventListener("input", () => {
              isEditing = true;
            });
          }
        });
    }

    function confirmEditing() {
      if (!isEditing) return true;
      return confirm("まだ編集中です。情報が消去されてしまいますがよろしいでしょうか。");
    }

    async function loadRecipeList() {
      try {
        const res = await fetch("./recipe-list.json", { cache: "no-store" });
        allRecipes = await res.json();
      } catch {
        allRecipes = [];
      }
      renderRecipeList();
    }

    function renderRecipeList() {
      const listEl = document.getElementById("recipeList");
      listEl.innerHTML = "";

      let filtered = allRecipes;
      if (currentGenre) filtered = filtered.filter(r => r.genre === currentGenre);
      if (currentTag) filtered = filtered.filter(r => (r.tags || []).includes(currentTag));

      if (filtered.length === 0) {
        listEl.innerHTML = `<div style="color:#aaa;font-size:0.9rem;">レシピ登録なし</div>`;
        return;
      }

      filtered.forEach(recipe => {
        const card = document.createElement("div");
        card.className = "recipe-card-mini";
        card.onclick = () => {
          if (!confirmEditing()) return;
          openDetail(recipe);
        };

        card.innerHTML = `
          <img class="recipe-thumb" src="${recipe.thumb || ""}">
          <div style="padding:0.5rem;">${recipe.title}</div>
        `;
        listEl.appendChild(card);
      });
    }

    async function openDetail(recipe) {
      window._currentRecipe = recipe;

      const wrapper = document.getElementById("detailWrapper");
      wrapper.style.display = "block";

      document.getElementById("detailTitle").textContent = recipe.title;
      document.getElementById("detailSubtitle").textContent = recipe.subtitle;

      const img = document.getElementById("detailImage");
      img.src = recipe.thumb || "";

      const ing1 = document.getElementById("detailIngredientsCol1");
      const ing2 = document.getElementById("detailIngredientsCol2");
      ing1.innerHTML = "";
      ing2.innerHTML = "";

      const half = Math.ceil((recipe.ingredients || []).length / 2);
      (recipe.ingredients || []).forEach((line, i) => {
        const li = document.createElement("li");
        li.textContent = line;
        if (i < half) ing1.appendChild(li);
        else ing2.appendChild(li);
      });

      const stepsEl = document.getElementById("detailSteps");
      stepsEl.innerHTML = "";
      (recipe.steps || []).forEach(line => {
        const li = document.createElement("li");
        li.textContent = line;
        stepsEl.appendChild(li);
      });

      wrapper.scrollIntoView({ behavior: "smooth" });

      document.getElementById("editRecipeBtn").onclick = () => {
        const r = window._currentRecipe;
        if (!r) return;

        document.getElementById("inputGenre").value = r.genre;
        document.getElementById("inputTitle").value = r.title;
        document.getElementById("inputSubtitle").value = r.subtitle;
        document.getElementById("inputIngredients").value = r.ingredients.join("\n");
        document.getElementById("inputSteps").value = r.steps.join("\n");
        document.getElementById("inputImage").value = r.thumb || "";

        isEditing = true;
        openAddModal();
      };

      document.getElementById("addNewRecipeBtn").onclick = () => {
        if (!confirmEditing()) return;
        openAddModal();
      };
    }
      wrapper.style.display = "none";
    }

    function toggleTagBar() {
      const bar = document.getElementById("tagBar");
      if (bar.style.display === "flex") {
        bar.style.display = "none";
        currentTag = null;
        renderRecipeList();
        hideDetail();
        return;
      }

      const tags = new Set();
      allRecipes.forEach(r => (r.tags || []).forEach(t => tags.add(t)));

      bar.innerHTML = "";
      tags.forEach(tag => {
        const pill = document.createElement("button");
        pill.className = "tag-pill";
        pill.textContent = tag;
        pill.onclick = () => {
          if (!confirmEditing()) return;
          currentTag = tag;
          currentGenre = null;
          renderRecipeList();
          hideDetail();
        };
        bar.appendChild(pill);
      });

      bar.style.display = "flex";
    }

    /* -------------------------
       レシピ追加モーダル処理
    ------------------------- */
    function setupAddModal() {
      document.getElementById("cancelAddBtn").onclick = () => {
        if (!confirmEditing()) return;
        closeAddModal();
      };

      document.getElementById("saveAddBtn").onclick = () => {
        saveRecipe();
      };
    }

    function openAddModal() {
      document.getElementById("addModalBackdrop").style.display = "flex";
      isEditing = true;
    }

    function closeAddModal() {
      document.getElementById("addModalBackdrop").style.display = "none";
      isEditing = false;
      clearAddForm();
    }

    function clearAddForm() {
      document.getElementById("inputGenre").value = "";
      document.getElementById("inputTitle").value = "";
      document.getElementById("inputSubtitle").value = "";
      document.getElementById("inputIngredients").value = "";
      document.getElementById("inputSteps").value = "";
      document.getElementById("inputImage").value = "";
    }

    function saveRecipe() {
      const genre = document.getElementById("inputGenre").value.trim();
      const title = document.getElementById("inputTitle").value.trim();
      const subtitle = document.getElementById("inputSubtitle").value.trim();
      const ingredients = document.getElementById("inputIngredients").value.trim().split("\n");
      const steps = document.getElementById("inputSteps").value.trim().split("\n");
      const image = document.getElementById("inputImage").value.trim();

      if (!genre || !title) {
        alert("ジャンルとタイトルは必須です");
        return;
      }

      const recipe = {
        genre,
        title,
        subtitle,
        ingredients,
        steps,
        thumb: image,
        file: `${title}.html`,
        tags: extractTags(ingredients, steps)
      };

      downloadRecipeHtml(recipe);
      generateJsonSnippet(recipe);

      isEditing = false;
      closeAddModal();
    }

    function extractTags(ingredients, steps) {
      const tags = new Set();
      ingredients.forEach(i => {
        if (i.length > 0) tags.add(i.split(" ")[0]);
      });
      return [...tags];
    }

    function downloadRecipeHtml(recipe) {
      const html = `
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>${recipe.title}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: sans-serif; padding: 1rem; }
img { width: 100%; border-radius: 0.5rem; }
</style>
</head>
<body>
<h1>${recipe.title}</h1>
<h3>${recipe.subtitle}</h3>
<img src="${recipe.thumb}">
<h2>材料</h2>
<ul>
${recipe.ingredients.map(i => `<li>${i}</li>`).join("")}
</ul>
<h2>作り方</h2>
<ol>
${recipe.steps.map(s => `<li>${s}</li>`).join("")}
</ol>
</body>
</html>
`;

      const blob = new Blob([html], { type: "text/html" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = recipe.file;
      a.click();
    }

    function generateJsonSnippet(recipe) {
      const snippet = `
{
  "genre": "${recipe.genre}",
  "title": "${recipe.title}",
  "subtitle": "${recipe.subtitle}",
  "tags": ${JSON.stringify(recipe.tags)},
  "thumb": "${recipe.thumb}",
  "file": "${recipe.file}"
}
`;
      console.log("JSON snippet:\n", snippet);
      alert("JSON スニペットをコンソールに出力しました");
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>レシピ追加</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 6px;
    }
    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      height: 120px;
      resize: vertical;
    }
    input[type="file"] {
      margin-top: 6px;
    }
    button {
      background: #ff4d4d;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      opacity: 0.9;
    }
    .back-btn {
      background: #555;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<h1>レシピ追加</h1>

<button class="back-btn" onclick="location.href='index.html'">← メインメニューに戻る</button>

<div class="form-group">
  <label>ジャンル</label>
  <select id="genre">
    <option value="主食">主食</option>
    <option value="副食">副食</option>
    <option value="主菜">主菜</option>
    <option value="副菜">副菜</option>
  </select>
</div>

<div class="form-group">
  <label>タイトル</label>
  <input type="text" id="title">
</div>

<div class="form-group">
  <label>サブタイトル</label>
  <input type="text" id="subtitle">
</div>

<div class="form-group">
  <label>画像（任意）</label>
  <input type="file" id="image" accept="image/*">
</div>

<div class="form-group">
  <label>材料（1行につき1つ）</label>
  <textarea id="ingredients"></textarea>
</div>

<div class="form-group">
  <label>作り方（番号なしでOK）</label>
  <textarea id="steps"></textarea>
</div>

<button onclick="saveRecipe()">保存</button>

<script>
function saveRecipe() {
  const genre = document.getElementById("genre").value;
  const title = document.getElementById("title").value;
  const subtitle = document.getElementById("subtitle").value;
  const ingredients = document.getElementById("ingredients").value.split("\n").filter(x => x.trim() !== "");
  const steps = document.getElementById("steps").value.split("\n").filter(x => x.trim() !== "");
  const fileInput = document.getElementById("image");

  if (!title.trim()) {
    alert("タイトルは必須です");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    const imageData = e?.target?.result || null;

    let list = JSON.parse(localStorage.getItem("recipes") || "[]");

    const safeTitle = title.replace(/[\\\/:*?"<>|]/g, "_");
    const fileName = `${genre}_${safeTitle}.html`;

    list.push({
      genre: genre,
      title: title,
      subtitle: subtitle,
      file: fileName,
      image: imageData,
      ingredients: ingredients,
      steps: steps
    });

    localStorage.setItem("recipes", JSON.stringify(list));

    alert("レシピを保存しました！");
    location.href = "index.html";
  };

  if (fileInput.files[0]) {
    reader.readAsDataURL(fileInput.files[0]);
  } else {
    reader.onload({ target: { result: null } });
  }
}
</script>

</body>
</html>

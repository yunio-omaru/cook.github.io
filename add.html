<script>
async function saveRecipe() {
  const genre = document.getElementById("genre").value;
  const title = document.getElementById("title").value;
  const subtitle = document.getElementById("subtitle").value;
  const ingredients = document.getElementById("ingredients").value.split("\n").filter(x => x.trim());
  const steps = document.getElementById("steps").value.split("\n").filter(x => x.trim());
  const fileInput = document.getElementById("image");

  if (!title.trim()) {
    alert("タイトルは必須です");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e) {
    const imageData = e?.target?.result || null;

    const recipeData = {
      genre,
      title,
      subtitle,
      image: imageData,
      ingredients,
      steps
    };

    const res = await fetch(
      "https://api.github.com/repos/yunio-omaru/cook.github.io/actions/workflows/update-recipe.yml/dispatches",
      {
        method: "POST",
        headers: {
          "Accept": "application/vnd.github+json",
          "Authorization": "Bearer {{GITHUB_TOKEN}}",  // ← ここは後で説明
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          ref: "main",
          inputs: {
            data: JSON.stringify(recipeData)
          }
        })
      }
    );

    alert("レシピ追加を受け付けました！（反映まで数秒かかります）");
  };

  if (fileInput.files[0]) {
    reader.readAsDataURL(fileInput.files[0]);
  } else {
    reader.onload({ target: { result: null } });
  }
}
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>きゅうりのバターグラッセ</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #222 0, #050505 55%, #000 100%);
  color: #f5f5f5;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 1rem;
}
.card {
  max-width: 900px;
  width: 100%;
  border-radius: 0.9rem;
  border: 1px solid #333;
  background: radial-gradient(circle at top left, #2a1515 0, #050505 55%, #000 100%);
  padding: 0.9rem;
  box-sizing: border-box;
  position: relative;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 0.5rem;
  border-bottom: 1px dashed rgba(255,255,255,0.08);
  padding-bottom: 0.4rem;
  padding-right: 4rem;
}
.card-title { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.06em; }
.card-subtitle { font-size: 0.75rem; color: #aaaaaa; }
.card-tag { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 999px; border: 1px solid rgba(255,255,255,0.15); color: #ff7043; }

.edit-btn {
  position: absolute;
  top: 0.9rem;
  right: 0.9rem;
  border: 1px solid #333;
  background: #151515;
  color: #f5f5f5;
  border-radius: 999px;
  padding: 0.25rem 0.7rem;
  font-size: 0.75rem;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}
.edit-btn:hover {
  background: #222;
  border-color: #ff7043;
}

.card-body { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 0.75rem; }
.card-top-row { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.3fr); gap: 0.75rem; }

.card-image { width: 100%; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.12); object-fit: cover; background: #111; aspect-ratio: 4 / 3; }
.section-title { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: #aaaaaa; margin-bottom: 0.25rem; }
.ingredients, .steps { font-size: 0.8rem; line-height: 1.5; }
.ingredients ul, .steps ol { margin: 0.2rem 0 0; padding-left: 1.1rem; }
.ingredients li, .steps li { margin-bottom: 0.15rem; }
.card-footer { margin-top: 0.4rem; font-size: 0.7rem; color: #aaaaaa; text-align: right; }

@media (max-width: 720px) { .card-top-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
  <article class="card" data-genre="副菜" data-title="きゅうりのバターグラッセ" data-subtitle="" data-tags="">
    <button class="edit-btn" id="editRecipeBtn">編集</button>
    <header class="card-header">
      <div>
        <div class="card-title">きゅうりのバターグラッセ</div>
        <div class="card-subtitle"></div>
      </div>
      <div class="card-tag">副菜</div>
    </header>
    <section class="card-body">
      <div class="card-top-row">
        <div>
          <div class="card-image" id="cardImage"></div>
        </div>
        <div>
          <div class="section-title">材料</div>
          <div class="ingredients"><ul><li>きゅうり：1〜2本（乱切り）</li><li>水：きゅうりがヒタヒタになる量</li><li>バター：1かけ</li><li>砂糖：大さじ1</li><li>塩：小さじ1（または3ふり）</li></ul></div>
        </div>
      </div>
      
      <div>
        <div class="section-title" style="margin-top:0.5rem;">作り方</div>
        <div class="steps"><ol><li>鍋にきゅうり＋水＋バター＋砂糖＋塩を入れる</li><li>中火で煮詰め、水分がほぼなくなるまで加熱</li><li>器に盛ると“洋風きゅうりの煮物”の完成</li></ol></div>
      </div>
    </section>
    <footer class="card-footer">ゴリのレシピ</footer>
  </article>

  <script>
    document.getElementById("editRecipeBtn").addEventListener("click", () => {
      const recipeData = {
        genre: "副菜",
        title: "きゅうりのバターグラッセ",
        subtitle: "",
        ingredients: ["きゅうり：1〜2本（乱切り）","水：きゅうりがヒタヒタになる量","バター：1かけ","砂糖：大さじ1","塩：小さじ1（または3ふり）"],
        steps: ["鍋にきゅうり＋水＋バター＋砂糖＋塩を入れる","中火で煮詰め、水分がほぼなくなるまで加熱","器に盛ると“洋風きゅうりの煮物”の完成"],
        image: document.getElementById("cardImage")?.src || ""
      };
      sessionStorage.setItem("edit_recipe_target", JSON.stringify(recipeData));
      window.location.href = "../index.html?mode=edit";
    });
  </script>
</body>
</html>

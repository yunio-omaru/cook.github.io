<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>主菜レシピ一覧</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f5f5f7; margin: 0; padding: 24px; }
    h1 { font-size: 24px; margin-bottom: 20px; }
    .recipe-card {
      background: #fff; border-radius: 14px; padding: 20px; margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08); text-decoration: none; color: #000; display: block;
    }
    .recipe-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .recipe-sub { font-size: 13px; color: #777; }
  </style>
</head>

<body>

<h1>主菜レシピ一覧</h1>

<div id="list"></div>

<script>
fetch("../recipe-list.json")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("list");

    data.filter(r => r.genre === "主菜").forEach(r => {
      const card = document.createElement("a");
      card.className = "recipe-card";
      card.href = "../recipes/" + r.file;

      card.innerHTML = `
        <div class="recipe-title">${r.title}</div>
        <div class="recipe-sub">${r.subtitle}</div>
      `;

      container.appendChild(card);
    });
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ジャンル別レシピ</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 20px;
  }
  h1 {
    font-size: 26px;
    margin-bottom: 20px;
  }
  select {
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  .recipe {
    background: #fff;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    display: flex;
    gap: 15px;
    align-items: center;
  }
  .recipe img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 10px;
  }
</style>
</head>

<body>

<h1>ジャンル別レシピ</h1>
<a href="../index.html">← 戻る</a>

<br><br>

<select id="genreSelect" onchange="render()">
  <option value="主食">主食</option>
  <option value="副食">副食</option>
  <option value="主菜">主菜</option>
  <option value="副菜">副菜</option>
</select>

<div id="list"></div>

<script>
const JSON_URL = "https://raw.githubusercontent.com/yunio-omaru/cook.github.io/main/recipe-list.json";
let recipes = [];

/* ▼ 初回ロードで JSON を取得 */
fetch(JSON_URL)
  .then(res => res.json())
  .then(data => {
    recipes = data;
    render();
  });

/* ▼ ジャンルに応じて表示を切り替える */
function render() {
  const genre = document.getElementById("genreSelect").value;
  const list = document.getElementById("list");
  list.innerHTML = "";

  recipes
    .filter(r => r.genre === genre)
    .forEach(r => {
      const div = document.createElement("div");
      div.className = "recipe";

      div.innerHTML = `
        ${r.image ? `<img src="${r.image}">` : `<img src="https://via.placeholder.com/120?text=No+Image">`}
        <div>
          <h3>${r.title}</h3>
          <p>${r.subtitle}</p>
          <a href="../${r.file}">レシピを見る</a>
        </div>
      `;

      list.appendChild(div);
    });
}
</script>

</body>
</html>

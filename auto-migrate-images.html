<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>レシピ画像自動変換・アップロード</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container {
      background: white;
      border-radius: 1rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      margin-top: 0;
      color: #333;
      text-align: center;
    }
    .setup-section {
      background: #f7fafc;
      padding: 1.5rem;
      border-radius: 0.75rem;
      margin-bottom: 2rem;
      border-left: 4px solid #667eea;
    }
    .setup-section h2 {
      margin-top: 0;
      color: #2d3748;
      font-size: 1rem;
    }
    .form-row {
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .form-row label {
      font-size: 0.9rem;
      color: #4a5568;
      font-weight: 600;
    }
    .form-row input {
      padding: 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-family: monospace;
    }
    .form-row input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }
    button {
      flex: 1;
      min-width: 150px;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }
    .btn-primary:disabled {
      background: #cbd5e0;
      cursor: not-allowed;
    }
    .status {
      margin-top: 2rem;
      padding: 1.5rem;
      border-radius: 0.75rem;
      display: none;
    }
    .status.show {
      display: block;
    }
    .status.success {
      background: #c6f6d5;
      border: 1px solid #9ae6b4;
      color: #22543d;
    }
    .status.error {
      background: #fed7d7;
      border: 1px solid #fc8181;
      color: #742a2a;
    }
    .status.info {
      background: #bee3f8;
      border: 1px solid #90cdf4;
      color: #2c5282;
    }
    .progress {
      margin-top: 1rem;
      background: #e2e8f0;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #667eea;
      width: 0%;
      transition: width 0.3s;
    }
    .log {
      margin-top: 1rem;
      background: #f7fafc;
      padding: 1rem;
      border-radius: 0.5rem;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.85rem;
      color: #4a5568;
    }
    .log-item {
      padding: 0.25rem 0;
      border-bottom: 1px solid #e2e8f0;
    }
    .log-item:last-child {
      border-bottom: none;
    }
    .log-success { color: #276749; }
    .log-error { color: #742a2a; }
    .log-info { color: #2c5282; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ レシピ画像自動変換・アップロード</h1>

    <div class="setup-section">
      <h2>📝 GitHub 認証情報を入力</h2>
      <div class="form-row">
        <label>GitHubユーザー名</label>
        <input type="text" id="ghUser" placeholder="例：yunio-omaru" />
      </div>
      <div class="form-row">
        <label>個人アクセストークン（PAT）</label>
        <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx" />
      </div>
      <div style="font-size: 0.85rem; color: #4a5568; margin-top: 0.5rem;">
        💡 <strong>トークンの作成方法：</strong> GitHub → Settings → Developer settings → Personal access tokens → Generate new token → repo スコープを選択
      </div>
    </div>

    <div class="buttons">
      <button class="btn-primary" onclick="startConversion()">🚀 画像を自動変換＆アップロード</button>
    </div>

    <div id="status" class="status">
      <div id="statusMessage"></div>
      <div class="progress">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <div id="log" class="log"></div>
    </div>
  </div>

  <script>
    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const item = document.createElement('div');
      item.className = `log-item log-${type}`;
      item.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(item);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function updateProgress(current, total) {
      const percent = (current / total) * 100;
      document.getElementById('progressBar').style.width = percent + '%';
    }

    function showStatus(message, type = 'info') {
      const statusDiv = document.getElementById('status');
      const messageDiv = document.getElementById('statusMessage');
      statusDiv.className = `status show ${type}`;
      messageDiv.innerHTML = message;
    }

    async function startConversion() {
      const user = document.getElementById('ghUser').value.trim();
      const token = document.getElementById('ghToken').value.trim();

      if (!user || !token) {
        showStatus('❌ ユーザー名とトークンを入力してください', 'error');
        return;
      }

      const statusDiv = document.getElementById('status');
      document.getElementById('log').innerHTML = '';
      statusDiv.classList.add('show');

      log('🔍 レシピファイルを取得中...', 'info');
      showStatus('処理中...', 'info');

      try {
        // Step 1: recipesフォルダ内の全てのHTMLファイルを取得
        const recipeFiles = await getRecipeFiles(user, token);
        log(`✓ ${recipeFiles.length} 個のレシピファイルを検出`, 'success');

        // Step 2: 各ファイルから画像を抽出
        const images = {};
        for (let i = 0; i < recipeFiles.length; i++) {
          updateProgress(i, recipeFiles.length);
          const file = recipeFiles[i];
          log(`処理中: ${file.name}`, 'info');
          
          const content = await getFileContent(user, token, file.path);
          const imageData = extractBase64Image(content);
          
          if (imageData) {
            const ext = imageData.format === 'png' ? 'png' : 'jpg';
            const imageName = `recipe_${String(i + 1).padStart(2, '0')}.${ext}`;
            images[imageName] = imageData.data;
            log(`✓ 画像抽出: ${imageName}`, 'success');
          }
        }

        updateProgress(recipeFiles.length, recipeFiles.length);

        // Step 3: 画像をアップロード
        log(`📤 ${Object.keys(images).length} 個の画像をアップロード中...`, 'info');
        const imageNames = await uploadImages(user, token, images);

        // Step 4: recipe-list.json を更新
        log('📝 recipe-list.json を更新中...', 'info');
        await updateRecipeListJson(user, token, imageNames, recipeFiles);

        // Step 5: 各レシピHTMLを更新
        log('🔄 レシピHTMLを更新中...', 'info');
        await updateRecipeHtmlFiles(user, token, imageNames, recipeFiles);

        showStatus('✅ 全ての処理が完了しました！<br>ページをリロードして確認してください。', 'success');
        log('🎉 処理完了！', 'success');

      } catch (err) {
        showStatus(`❌ エラーが発生しました: ${err.message}`, 'error');
        log(`エラー: ${err.message}`, 'error');
        console.error(err);
      }
    }

    async function getRecipeFiles(user, token) {
      const url = `https://api.github.com/repos/${user}/cook.github.io/contents/recipes`;
      const res = await fetch(url, {
        headers: { "Authorization": `token ${token}` }
      });
      if (!res.ok) throw new Error('レシピフォルダの取得に失敗');
      const files = await res.json();
      return files.filter(f => f.name.endsWith('.html') && f.name !== '.gitkeep');
    }

    async function getFileContent(user, token, path) {
      const url = `https://api.github.com/repos/${user}/cook.github.io/contents/${path}`;
      const res = await fetch(url, {
        headers: { "Authorization": `token ${token}` }
      });
      if (!res.ok) throw new Error(`ファイル取得失敗: ${path}`);
      const data = await res.json();
      return decodeURIComponent(escape(atob(data.content)));
    }

    function extractBase64Image(htmlContent) {
      const match = htmlContent.match(/src="(data:image\/(png|jpeg|jpg|gif|webp);base64,[^"]+)"/);
      if (!match) return null;

      const dataUrl = match[1];
      const format = match[2];
      const base64Data = dataUrl.split(',')[1];

      return { data: base64Data, format };
    }

    async function uploadImages(user, token, images) {
      const repo = 'cook.github.io';
      const imageNames = {};

      for (const [imageName, base64Data] of Object.entries(images)) {
        const path = `images/${imageName}`;
        const url = `https://api.github.com/repos/${user}/${repo}/contents/${path}`;

        const body = {
          message: `add: レシピ画像 ${imageName}`,
          content: base64Data
        };

        const res = await fetch(url, {
          method: 'PUT',
          headers: {
            "Authorization": `token ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify(body)
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(`画像アップロード失敗 ${imageName}: ${err.message}`);
        }

        log(`✓ アップロード: ${imageName}`, 'success');
        imageNames[imageName] = imageName;
      }

      return imageNames;
    }

    async function updateRecipeListJson(user, token, imageNames, recipeFiles) {
      // recipe-list.json を取得
      const jsonUrl = `https://api.github.com/repos/${user}/cook.github.io/contents/recipe-list.json`;
      const jsonRes = await fetch(jsonUrl, {
        headers: { "Authorization": `token ${token}` }
      });

      if (!jsonRes.ok) throw new Error('recipe-list.json の取得に失敗');

      const jsonData = await jsonRes.json();
      const recipeList = JSON.parse(decodeURIComponent(escape(atob(jsonData.content))));

      // 画像パスを更新
      for (let i = 0; i < recipeList.length; i++) {
        const imageName = `recipe_${String(i + 1).padStart(2, '0')}.jpg`;
        if (imageNames[imageName] || imageNames[imageName.replace('.jpg', '.png')]) {
          const actualName = imageNames[imageName] || imageNames[imageName.replace('.jpg', '.png')];
          recipeList[i].thumb = `images/${actualName}`;
        }
      }

      // アップロード
      const updatedJson = JSON.stringify(recipeList, null, 2);
      const base64Json = btoa(unescape(encodeURIComponent(updatedJson)));

      const updateRes = await fetch(jsonUrl, {
        method: 'PUT',
        headers: {
          "Authorization": `token ${token}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: 'update: recipe-list.json - 画像パスを更新',
          content: base64Json,
          sha: jsonData.sha
        })
      });

      if (!updateRes.ok) throw new Error('recipe-list.json のアップロードに失敗');
      log('✓ recipe-list.json を更新', 'success');
    }

    async function updateRecipeHtmlFiles(user, token, imageNames, recipeFiles) {
      for (let i = 0; i < recipeFiles.length; i++) {
        const file = recipeFiles[i];
        let content = await getFileContent(user, token, file.path);

        const imageName = `recipe_${String(i + 1).padStart(2, '0')}.jpg`;
        const actualImageName = imageNames[imageName] || imageNames[imageName.replace('.jpg', '.png')] || imageName;

        // src="data:image/..." を src="images/..." に置換
        content = content.replace(
          /src="data:image\/[^;]+;base64,[^"]+"/g,
          `src="../images/${actualImageName}"`
        );

        // アップロード
        const base64Html = btoa(unescape(encodeURIComponent(content)));
        const updateUrl = `https://api.github.com/repos/${user}/cook.github.io/contents/${file.path}`;

        const updateRes = await fetch(updateUrl, {
          method: 'PUT',
          headers: {
            "Authorization": `token ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: `update: ${file.name} - 画像パスを外部参照に変更`,
            content: base64Html,
            sha: file.sha
          })
        });

        if (!updateRes.ok) throw new Error(`HTMLファイル更新失敗: ${file.name}`);
        log(`✓ 更新: ${file.name}`, 'success');
      }
    }
  </script>
</body>
</html>

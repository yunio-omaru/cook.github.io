name: Generate Recipe List JSON

on:
  push:
    paths:
      - 'recipes/**.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate JSON from HTML files
        run: |
          node -e '
          const fs = require("fs");
          const path = require("path");
          
          const recipesDir = "recipes";
          if (!fs.existsSync(recipesDir)) {
            fs.writeFileSync("recipe-list.json", "[]");
            process.exit(0);
          }
          
          const files = fs.readdirSync(recipesDir).filter(f => f.endsWith(".html"));
          const list = [];
          
          files.forEach(file => {
            const filePath = path.join(recipesDir, file);
            const html = fs.readFileSync(filePath, "utf8");
            
            // 1. タグ内の data-属性 からの抽出を試みる（ダブル/シングル対応）
            let genreMatch = html.match(/data-genre=["\']([^"\']*)["\']/);
            let titleMatch = html.match(/data-title=["\']([^"\']*)["\']/);
            let subtitleMatch = html.match(/data-subtitle=["\']([^"\']*)["\']/);
            let tagsMatch = html.match(/data-tags=["\']([^"\']*)["\']/);
            
            // 2. 💡【超重要】タグになければ、下部の <script> 内の記述から直接抽出する
            if (!genreMatch) genreMatch = html.match(/genre\s*:\s*["\']([^"\']*)["\']/);
            if (!titleMatch) titleMatch = html.match(/title\s*:\s*["\']([^"\']*)["\']/);
            if (!subtitleMatch) subtitleMatch = html.match(/subtitle\s*:\s*["\']([^"\']*)["\']/);
            if (!tagsMatch) tagsMatch = html.match(/tags\s*:\s*["\']([^"\']*)["\']/);
            
            // 3. 画像（サムネイル）の抽出：idの有無に関わらず、最初のimgまたはscript内のimageから取得
            let imgMatch = html.match(/<img[^>]+src=["\']([^"\']*)["\']/i);
            if (!imgMatch) imgMatch = html.match(/image\s*:\s*["\']([^"\']*)["\']/);
            
            // 4. タイトルの最終バックアップ（<title>タグ、またはファイル名）
            const htmlTitleMatch = html.match(/<title>([^<]*)<\/title>/i);
            const fallbackTitle = htmlTitleMatch ? htmlTitleMatch[1].trim() : file.replace(".html", "");
            
            const finalTitle = (titleMatch && titleMatch[1]) ? titleMatch[1] : fallbackTitle;
            const finalGenre = (genreMatch && genreMatch[1]) ? genreMatch[1] : "未分類";
            const finalSubtitle = (subtitleMatch && subtitleMatch[1]) ? subtitleMatch[1] : "";
            
            // タグから取れたか、スクリプトから取れたかで処理を変えてtags配列を作る
            let finalTags = [];
            if (tagsMatch && tagsMatch[1]) {
              finalTags = tagsMatch[1].split(",").map(t => t.trim()).filter(t => t);
            } else if (finalSubtitle) {
              // subtitle（そうめん,豚,ナスなど）をカンマで区切ってタグ代わりにする救出策
              finalTags = finalSubtitle.split(",").map(t => t.trim()).filter(t => t);
            }
            
            let thumbPath = (imgMatch && imgMatch[1]) ? imgMatch[1] : "";
            if (thumbPath.indexOf("../") === 0) {
              thumbPath = thumbPath.replace("../", "");
            }

            // どんなファイル構造でも必ずpushして救出する
            list.push({
              genre: finalGenre,
              title: finalTitle,
              subtitle: finalSubtitle,
              tags: finalTags,
              thumb: thumbPath,
              file: file
            });
          });
          
          fs.writeFileSync("recipe-list.json", JSON.stringify(list, null, 2));
          '

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add recipe-list.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Auto-generate recipe-list.json (Script Parsing Version)" && git push)

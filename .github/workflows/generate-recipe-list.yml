name: Generate Recipe List JSON

on:
  push:
    paths:
      - 'recipes/**.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate JSON from HTML files
        run: |
          node -e '
          const fs = require("fs");
          const path = require("path");
          
          const recipesDir = "recipes";
          if (!fs.existsSync(recipesDir)) {
            fs.writeFileSync("recipe-list.json", "[]");
            process.exit(0);
          }
          
          const files = fs.readdirSync(recipesDir).filter(f => f.endsWith(".html"));
          const list = [];
          
          files.forEach(file => {
            const filePath = path.join(recipesDir, file);
            const html = fs.readFileSync(filePath, "utf8");
            
            // 💡 属性のクォーテーションがシングル/ダブルどちらでも対応できるように正規表現を強化
            const genreMatch = html.match(/data-genre=["\']([^"\']*)["\']/);
            const titleMatch = html.match(/data-title=["\']([^"\']*)["\']/);
            const subtitleMatch = html.match(/data-subtitle=["\']([^"\']*)["\']/);
            const tagsMatch = html.match(/data-tags=["\']([^"\']*)["\']/);
            const thumbMatch = html.match(/<img[^>]*id=["\']cardImage["\'][^>]*src=["\']([^"\']*)["\']/);
            
            // 💡 もしHTML内に属性がない場合の救出策（<title>タグや、最悪ファイル名からタイトルを取得）
            const htmlTitleMatch = html.match(/<title>([^<]*)<\/title>/i);
            const fallbackTitle = (htmlTitleMatch && htmlTitleMatch[1]) ? htmlTitleMatch[1].trim() : file.replace(".html", "");
            
            // タイトル属性があればそれを使い、なければ救出策のタイトルを使う
            const finalTitle = (titleMatch && titleMatch[1]) ? titleMatch[1] : fallbackTitle;
            
            let thumbPath = thumbMatch ? thumbMatch[1] : "";
            if (thumbPath.startsWith("../")) {
              thumbPath = thumbPath.replace(/^\.\.\//, "");
            }

            // 💡 条件を緩めて、どんなHTMLファイルでも必ずリストに含めるように変更
            list.push({
              genre: (genreMatch && genreMatch[1]) ? genreMatch[1] : "未分類",
              title: finalTitle,
              subtitle: (subtitleMatch && subtitleMatch[1]) ? subtitleMatch[1] : "",
              tags: (tagsMatch && tagsMatch[1]) ? tagsMatch[1].split(",").map(t => t.trim()).filter(t => t) : [],
              thumb: thumbPath,
              file: file
            });
          });
          
          fs.writeFileSync("recipe-list.json", JSON.stringify(list, null, 2));
          '

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add recipe-list.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Auto-generate recipe-list.json (Robust Version)" && git push)
